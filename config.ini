; ============================================================
; Configuración del Fuzzing Bot
; ============================================================

[General]
; Navegador por defecto (chrome, edge, firefox, brave, opera)
navegador = chrome

; Mostrar el aviso de VPN al iniciar
mostrar_vpn_aviso = true

; Velocidad de escritura (milisegundos entre teclas)
velocidad_escritura = 2

; Tiempo de espera entre pestañas (milisegundos)
delay_pestaña = 300

; ============================================================
; Configuración del Backend Python
; ============================================================

[Backend]
; Número de threads para el escaneo en paralelo
threads = 50

; Tiempo de espera por petición (segundos)
timeout = 3

; Número de reintentos en caso de fallo
retries = 2
